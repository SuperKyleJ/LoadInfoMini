<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <meta name="color-scheme" content="dark">

    <title>Load Info Mini</title>

    <link rel="icon" type="image/x-icon" href="logo.png">
    <style> 
        html,
        body {
            margin: 0;
            padding: 0;

            width: 600px;
            height: 600px;

            overflow: hidden;

            background-color: black;
            color: white;

            font-family: Arial, sans-serif;
        }

        body {
            box-sizing: border-box;

            padding: 20px;

            display: flex;
            flex-direction: column;

            gap: 20px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .title {
            font-size: 32px;
            font-weight: bold;
        }
        .homeButton {
            margin-top: auto;

            font-size: 20px;

            padding: 12px;

            border: none;
            border-radius: 20px;

            background-color: #1f1f1f;
            color: white;
        }
        .card {
            background-color: #111;

            border-radius: 24px;

            padding: 12px;

            display: flex;
            flex-direction: column;

            gap: 10px;
        }

        .label {
            font-size: 12px;

            opacity: 0.7;
        }

        .value {
            font-size: 20px;
            font-weight: bold;

            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="title">Trucking Helper</div>
        <button class="homeButton" onclick="window.location.href = './index.html'">
            <i data-lucide="house"> </i>
        </button>
    </div>
    <div class="card">

        <div class="label">
            Allowed Weight   <i data-lucide="weight" width="18" height="18"></i>

        </div>

        <div class="value" >
            Steers: 12500 lbs
            Drive: 48000 lbs
            Trailer: 58000 lbs
        </div>
        <div class="value" >
            Total: 80000 lbs
        </div>
    </div>
    <button class="homeButton" onclick="window.location.href='brakeTestTutorial.html'">
            <i data-lucide="octagon" width="18" height="18"> </i> Brake Test Tutorial
        </button>

  <script src="https://unpkg.com/lucide@latest"></script>
  <script>
    lucide.createIcons();
  </script>
</body>
</html>
